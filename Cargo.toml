[package]
name = "plantuml-little"
version = "1.2026.2"
edition = "2021"
rust-version = "1.82"
license = "GPL-3.0-or-later OR LGPL-3.0-or-later OR Apache-2.0 OR EPL-2.0 OR MIT"
authors = ["kookyleo <kookyleo@gmail.com>"]
description = "Lightweight .puml to .svg converter — byte-exact SVG parity with Java PlantUML"
homepage = "https://github.com/kookyleo/plantuml-little"
repository = "https://github.com/kookyleo/plantuml-little"
keywords = ["plantuml", "puml", "svg", "diagram", "uml"]
categories = ["graphics", "command-line-utilities"]
exclude = [
    "AGENTS.md",
    "PLAN.md",
    "continue.md",
    "*.log",
    "*.rlib",
    "tmp_debug/",
    "tests/ext_fixtures/",
    ".trace-skill/",
    ".claude/",
    "scripts/",
    "patch_java.py",
]

[[bin]]
name = "plantuml-little"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
thiserror = "1"
log = "0.4"
env_logger = "0.11"
regex = "1"
vizoxide = "1.0.5"
zip = { version = "0.6.6", default-features = false, features = ["deflate"] }
ttf-parser = "0.25"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
flate2 = { version = "1", features = ["zlib"], default-features = false }
serde_json = "1"
base64 = "0.22"

[patch.crates-io]
vizoxide = { git = "https://github.com/kookyleo/vizoxide.git", branch = "fix/lifetime-elision-warnings" }
