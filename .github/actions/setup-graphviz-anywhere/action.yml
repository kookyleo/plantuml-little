name: Setup graphviz-anywhere native lib
description: >
  Download the prebuilt libgraphviz_api from the graphviz-anywhere GitHub
  release matching $GRAPHVIZ_ANYWHERE_VERSION and extract it to
  `.graphviz-anywhere/` at the workspace root. The caller should then set
  `GRAPHVIZ_ANYWHERE_DIR` to `$GITHUB_WORKSPACE/.graphviz-anywhere` and (on
  linux) add `.graphviz-anywhere/lib` to `LD_LIBRARY_PATH`.
runs:
  using: composite
  steps:
    - name: Download graphviz-anywhere prebuilt (linux-x86_64)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        ver="${GRAPHVIZ_ANYWHERE_VERSION:-v0.1.5}"
        url="https://github.com/kookyleo/graphviz-anywhere/releases/download/${ver}/graphviz-native-linux-x86_64.tar.gz"
        echo "Downloading ${url}"
        curl -fsSL "${url}" -o /tmp/graphviz-anywhere.tar.gz
        mkdir -p "${GITHUB_WORKSPACE}/.graphviz-anywhere"
        tar -xzf /tmp/graphviz-anywhere.tar.gz -C "${GITHUB_WORKSPACE}/.graphviz-anywhere"
        ls "${GITHUB_WORKSPACE}/.graphviz-anywhere"
        ls "${GITHUB_WORKSPACE}/.graphviz-anywhere/lib"

    - name: Download graphviz-anywhere prebuilt (macos)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        ver="${GRAPHVIZ_ANYWHERE_VERSION:-v0.1.5}"
        url="https://github.com/kookyleo/graphviz-anywhere/releases/download/${ver}/graphviz-native-macos-universal.tar.gz"
        echo "Downloading ${url}"
        curl -fsSL "${url}" -o /tmp/graphviz-anywhere.tar.gz
        mkdir -p "${GITHUB_WORKSPACE}/.graphviz-anywhere"
        tar -xzf /tmp/graphviz-anywhere.tar.gz -C "${GITHUB_WORKSPACE}/.graphviz-anywhere"
        ls "${GITHUB_WORKSPACE}/.graphviz-anywhere"
        ls "${GITHUB_WORKSPACE}/.graphviz-anywhere/lib"

    - name: Download graphviz-anywhere prebuilt (windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        ver="${GRAPHVIZ_ANYWHERE_VERSION:-v0.1.5}"
        url="https://github.com/kookyleo/graphviz-anywhere/releases/download/${ver}/graphviz-native-windows-x86_64.zip"
        echo "Downloading ${url}"
        curl -fsSL "${url}" -o /tmp/graphviz-anywhere.zip
        mkdir -p "${GITHUB_WORKSPACE}/.graphviz-anywhere"
        7z x /tmp/graphviz-anywhere.zip -o"${GITHUB_WORKSPACE}/.graphviz-anywhere"
