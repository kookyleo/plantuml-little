name: Release

# Tag-driven publish to crates.io + npm.
#
# Push a `vX.Y.Z` tag to main to trigger. The Rust crate version in
# Cargo.toml must already match (e.g. `1.2026.2-3` for tag `v1.2026.2-3`).
# The `packages/web/package.json` version must also match — both crates
# publish under the same version, same tag.
#
# Publish is gated behind the full quality suite: fmt, clippy (-D warnings),
# unit tests, integration tests, and reference tests against the
# tests/known_failures.txt baseline. No silent "FAILED but accepted"
# — if the gate trips, the tag publishes nothing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Must stay in sync with the graphviz-anywhere version in Cargo.toml.
  GRAPHVIZ_ANYWHERE_VERSION: v0.1.6

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install runtime deps + DejaVu fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libstdc++6 libexpat1 zlib1g fonts-dejavu-core fontconfig
          fc-cache -f

      - name: Install graphviz-anywhere native lib
        uses: ./.github/actions/setup-graphviz-anywhere

      - name: Install tests/support npm deps (for wasm backend)
        run: |
          cd tests/support
          npm install

      - name: Verify tag matches Cargo.toml + packages/web/package.json versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate_version=$(grep -m1 '^version =' Cargo.toml | sed -E 's/^version = "(.+)"/\1/')
          if [ "$tag" != "$crate_version" ]; then
            echo "::error::Tag v${tag} does not match Cargo.toml version ${crate_version}"
            exit 1
          fi
          web_version=$(node -p "require('./packages/web/package.json').version")
          if [ "$tag" != "$web_version" ]; then
            echo "::error::Tag v${tag} does not match packages/web/package.json version ${web_version}"
            exit 1
          fi
          echo "Publishing plantuml-little ${crate_version} (crates.io + npm)"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere

      - name: Unit tests
        run: cargo test --lib
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere
          LD_LIBRARY_PATH: ${{ github.workspace }}/.graphviz-anywhere/lib

      - name: Integration tests
        run: cargo test --test integration
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere
          LD_LIBRARY_PATH: ${{ github.workspace }}/.graphviz-anywhere/lib

      - name: Reference tests (baseline-gated, wasm backend)
        run: ./scripts/check_reference_failures.sh
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere
          LD_LIBRARY_PATH: ${{ github.workspace }}/.graphviz-anywhere/lib
          PLANTUML_LITTLE_TEST_BACKEND: wasm

  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        # --no-verify: matches kookyleo/graphviz-anywhere's pattern. The gate
        # job already ran the full test suite against a real build; verify
        # here would just redo the native lib setup.
        run: cargo publish --token "${{ secrets.CARGO_TOKEN }}" --no-verify

  publish-npm-web:
    name: Publish @kookyleo/plantuml-little-web to npm
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: Build wasm (packages/web)
        working-directory: packages/web
        run: |
          wasm-pack build --target bundler --out-dir dist/wasm --out-name plantuml_little_web
          rm -f dist/wasm/package.json dist/wasm/.gitignore dist/wasm/README.md

      - name: Install & build TypeScript wrapper
        working-directory: packages/web
        run: |
          npm install --no-audit --no-fund
          npm run build:ts

      - name: Verify dist layout
        working-directory: packages/web
        run: |
          ls -la dist
          ls -la dist/wasm
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/wasm/plantuml_little_web.js
          test -f dist/wasm/plantuml_little_web_bg.wasm

      - name: Publish to npm
        working-directory: packages/web
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
