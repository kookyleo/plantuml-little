name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # graphviz-anywhere ships its native libgraphviz_api via a GitHub release
  # per tag; consumers point GRAPHVIZ_ANYWHERE_DIR at the extracted tarball.
  # Bump when updating the graphviz-anywhere dep in Cargo.toml.
  GRAPHVIZ_ANYWHERE_VERSION: v0.1.5

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install graphviz-anywhere native lib
        uses: ./.github/actions/setup-graphviz-anywhere
      - run: cargo clippy --all-targets -- -D warnings
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere

  test-lib:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install graphviz-anywhere native lib
        uses: ./.github/actions/setup-graphviz-anywhere
      - run: cargo test --lib
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere
          LD_LIBRARY_PATH: ${{ github.workspace }}/.graphviz-anywhere/lib

  test-reference:
    name: Reference Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install graphviz-anywhere native lib
        uses: ./.github/actions/setup-graphviz-anywhere
      - run: cargo test --test reference_tests -- --nocapture 2>&1 | tee ref_results.txt
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere
          LD_LIBRARY_PATH: ${{ github.workspace }}/.graphviz-anywhere/lib
      - name: Report reference test result
        run: |
          tail -n 5 ref_results.txt
          # Reference tests include a handful of known-diverging fixtures
          # (SCXML, preprocessor jaws, etc.); we just need the test run to
          # terminate with a valid summary line.
          grep -E "test result: (ok|FAILED)\." ref_results.txt

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install graphviz-anywhere native lib
        uses: ./.github/actions/setup-graphviz-anywhere
      - run: cargo test --test integration
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere
          LD_LIBRARY_PATH: ${{ github.workspace }}/.graphviz-anywhere/lib

  build-release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test-lib, test-reference, test-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install graphviz-anywhere native lib
        uses: ./.github/actions/setup-graphviz-anywhere
      - run: cargo build --release
        env:
          GRAPHVIZ_ANYWHERE_DIR: ${{ github.workspace }}/.graphviz-anywhere
          LD_LIBRARY_PATH: ${{ github.workspace }}/.graphviz-anywhere/lib
      - name: Binary size
        run: ls -lh target/release/plantuml-little
