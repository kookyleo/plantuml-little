1="158.2266" y2="171.2266"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="32.9741" x2="73.9741" y1="171.2266" y2="171.2266"/><line style="stroke:#181818;stroke-width:1;" x1="42.9741" x2="32.9741" y1="167.2266" y2="171.2266"/><line style="stroke:#181818;stroke-width:1;" x1="42.9741" x2="32.9741" y1="175.2266" y2="171.2266"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198.9165" x="38.9741" y="62.3638">the arrow and text are located</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.4814" x="38.9741" y="77.4966">inside the Lifeline because</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171.666" x="38.9741" y="92.6294">they are counted from the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="147.0879" x="38.9741" y="107.7622">right side of the active</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.9492" x="38.9741" y="122.895">member's column bar</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.2451" x="38.9741" y="138.0278">(Lifeline). Which is an</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.8862" x="38.9741" y="153.1606">incorrect display, right?</text></g><g class="message" data-entity-1="part1" data-entity-2="part1" id="msg2"><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="31.9741" x2="73.9741" y1="306.2891" y2="306.2891"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="73.9741" x2="73.9741" y1="306.2891" y2="319.2891"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="32.9741" x2="73.9741" y1="319.2891" y2="319.2891"/><line style="stroke:#181818;stroke-width:1;" x1="42.9741" x2="32.9741" y1="315.2891" y2="319.2891"/><line style="stroke:#181818;stroke-width:1;" x1="42.9741" x2="32.9741" y1="323.2891" y2="319.2891"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="199.6274" x="38.9741" y="195.2935">also the arrow is not displayed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.6685" x="38.9741" y="210.4263">correctly (issue: #1678). (I</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.0581" x="38.9741" y="225.5591">wonder if the closing of the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.3203" x="38.9741" y="240.6919">Lifeline is displayed correctly?</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.5249" x="38.9741" y="255.8247">Should it also include the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="197.209" x="38.9741" y="270.9575">arrow before it, i.e. close after</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.0513" x="38.9741" y="286.0903">it? If not, how do I close the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.1616" x="38.9741" y="301.2232">Life Line after the last arrow?)</text></g><?plantuml-src RP5DIyD048Rl-HKlUB25jbGFAgMGSq5F2futcqapkDajEnlRAlvt9rz5qSl2RjwFPoRonlvWecdmcG5uCgU6HCoUX3y8j-jrzfLbnYP-DudmGfAoxi1skrpsLsoGQeA9CHnXV8b4fwHNWWjMFINO2vVKgnwv8iUUK90rhVIFvrviG-ixSHL3qqiZx-k4tXcgeQAZ83JK51IlHIskRJmA4p6RWkShlDPiQx0eZ5RR42FPX9BbuCnvCUJcVuSmJiAFITJlmyMcO6EGEsF68YrjS7LpT_-WXRCTZi6N5C43g7L1sEydxilGclbFNexdEhHEzvG628LsxRYm0QQWAkYEE2t0Arhr1VgjIbrdoh6hEjW5QjMM0RjHC9NhuITvz-QCf24vdsSb_Vgxtm00?></g></svg>